tab:
  enable: false
  # tick
  update-interval: 20
  layout:
    header:
      - '<gradient:#00EEEE:#FFF5EE>测试服务器</gradient>'
    footer:
      - 'TPS: %server_tps_1_colored% &fMem: &2%server_ram_used%/&2%server_ram_max%'
  groups:
    owner:
      prefix: '<color:#ffffff>[</color><color:#B22222>腐竹</color><color:#ffffff>]</color> '
      suffix: ''
    admin:
      prefix: '&f[&e管理员&f] '
      suffix: ''
    default:
      prefix: '&f[&a玩家&f] '
      suffix: ''
    _default_:
      prefix: '&f[&a玩家&f] '
      suffix: ''
  # 仅在 1.21.3 及以上版本生效
  slot:
    - 'owner'
    - 'admin'
    - 'default'