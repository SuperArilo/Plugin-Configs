attack-bar:
  enable: false
  #最多给玩家显示的 bar 数量
  max-bar: 3
  #清理超过20秒后的没有继续被攻击的实体对应的血条 单位秒
  clear_last_attack_record: 20
  #用于定时清理对玩家产生的显示实体的血条（清理满足大于 clear_last_attack_record 的记录） 单位秒
  tick_clear_dealy: 30
  # 伤害追踪配置
  damage-tracker:
    #用于定时清理伤害追踪列表记录周期 单位秒
    tick_clear_dealy: 30
    #清理超过20秒后的被攻击的实体记录 单位秒
    clear_last_attack_record: 20
    #排除可被追踪的实体
    excluded-entities:
      - ARMOR_STAND